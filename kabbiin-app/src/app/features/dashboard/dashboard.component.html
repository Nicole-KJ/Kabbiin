<div class="space-y-6 animate-fade-in p-6">
    <div>
        <h1 class="text-2xl font-bold text-slate-800">Resumen General</h1>
        <p class="text-slate-500 text-sm">Bienvenido Esteban, estado actual de tus cabinas.</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
        <div *ngFor="let card of kpiCards" class="bg-white p-5 rounded-xl border border-slate-100 shadow-sm hover:shadow-md transition-shadow">
            <div class="flex justify-between items-start">
                <div>
                    <p class="text-slate-500 text-xs font-medium uppercase tracking-wider">{{ card.title }}</p>
                    <h3 class="text-2xl font-bold text-slate-800 mt-1">{{ card.value }}</h3>
                    <span class="text-xs font-semibold text-green-500 bg-green-50 px-2 py-0.5 rounded-full mt-2 inline-block">
                        {{ card.trend }} vs mes anterior
                    </span>
                </div>
                <div [class]="card.color" class="p-2 rounded-lg">
                    <lucide-icon [img]="card.icon" [size]="20"></lucide-icon>
                </div>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 h-96">
        <div class="bg-white p-6 rounded-xl border border-slate-100 shadow-sm lg:col-span-2 flex flex-col">
            <h3 class="font-bold text-slate-700 mb-6">Ingresos del Semestre</h3>
            <div class="flex-1 w-full min-h-0 overflow-hidden">
                <ngx-charts-bar-vertical
                    [results]="chartData"
                    [scheme]="colorScheme"
                    [gradient]="false"
                    [xAxis]="true"
                    [yAxis]="true"
                    [legend]="false"
                    [showXAxisLabel]="false"
                    [showYAxisLabel]="true"
                    [yAxisLabel]="'Colones'"
                    [barPadding]="40"
                    [roundEdges]="true">
                </ngx-charts-bar-vertical>
            </div>
        </div>
    </div>
</div>
